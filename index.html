    function SvgIcon({ size=24, color='currentColor', paths=[], circles=[], rects=[], filled=false, strokeWidth=2 }) {
      return (
        <svg width={size} height={size} viewBox="0 0 24 24"
          fill={filled ? color : 'none'}
          stroke={filled ? 'none' : color}
          strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
          {circles.map(([cx,cy,r],i) => <circle key={i} cx={cx} cy={cy} r={r}/>)}
          {rects.map(([x,y,w,h,rx],i) => <rect key={i} x={x} y={y} width={w} height={h} rx={rx||0}/>)}
          {paths.map((d,i) => <path key={i} d={d}/>)}
        </svg>
      );
    }

    /* ─── 자세 이미지 렌더 컴포넌트 ─── */
    function PostureImageCard({ src, label, labelColor, borderColor, bgColor }) {
      const [err, setErr] = useState(false);
      const isEmpty = !src;
      return (
        <div style={{background:bgColor, border:`2px solid ${borderColor}`, borderRadius:10, padding:10, textAlign:'center'}}>
          <div style={{fontSize:12, fontWeight:700, color:labelColor, marginBottom:6}}>{label}</div>
          {!isEmpty && !err ? (
            <img
              src={src} alt={label}
              onError={() => setErr(true)}
              style={{width:'100%', borderRadius:8, objectFit:'cover', aspectRatio:'4/3', display:'block', background:'var(--sur2)'}}
            />
          ) : (
            <div style={{
              width:'100%', aspectRatio:'4/3', borderRadius:8, background:'var(--sur2)',
              border:'1.5px dashed var(--bd)', display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center', color:'var(--tx3)', fontSize:11, gap:4
            }}>
              <span style={{fontSize:22}}>🖼️</span>
              <span>{err ? '이미지 로드 실패' : 'URL을 입력하세요'}</span>
            </div>
          )}
        </div>
      );
    }

/* ─── 날짜 유틸 ─── */
const toDateStr = d => d.toISOString().split('T')[0];
const getTodayStr = () => toDateStr(new Date());
function getWeekDays(){
  const t=new Date(); t.setHours(0,0,0,0);
  const s=new Date(t); s.setDate(t.getDate()-t.getDay());
  return Array.from({length:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});
}

function getExsByDay(d){
  if(d===0)return EX.d0;if(d===1)return[...EX.d1];if(d===2)return[...EX.d1,...EX.d2];
  if(d>=3&&d<=7)return[...EX.d1,...EX.d2,...EX.d3];if(d>=8&&d<=14)return EX.w2;
  if(d>=15&&d<=28)return[...EX.w2,...EX.w3];if(d>=29&&d<=42)return[...EX.w2,...EX.w3,...EX.w5];
  return[...EX.w5,...EX.w7];
}
function getPhase(d){return d<=7?1:d<=28?2:3}
function dayLabel(d){if(d===0)return'수술 당일';if(d<=7)return`수술 후 ${d}일`;return`수술 후 ${Math.ceil(d/7)}주`;}

/* ─── 진행률 링 ─── */
function ProgressRing({pct,size=60,stroke=6,color}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bd)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||'var(--p)'} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={c-((pct||0)/100)*c} style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dashoffset 0.6s'}}/><text x={size/2} y={size/2+5} textAnchor="middle" fontSize={size/5} fontWeight="700" fill="var(--tx)">{Math.round(pct)}%</text></svg>);
}

/* ─── 타이머 ─── */
function ExerciseTimer({holdTime,onAutoRep}){
  const [left,setLeft]=useState(holdTime);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&left>0){ref.current=setInterval(()=>setLeft(l=>{if(l<=1){clearInterval(ref.current);setRunning(false);setDone(true);onAutoRep&&onAutoRep();return 0;}return l-1;}),1000);}
    return()=>clearInterval(ref.current);
  },[running]);
  const reset=()=>{clearInterval(ref.current);setLeft(holdTime);setRunning(false);setDone(false);};
  const pct=((holdTime-left)/holdTime)*100,r=44,c=2*Math.PI*r;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
      <svg width="112" height="112" viewBox="0 0 112 112">
        <circle cx="56" cy="56" r={r} fill="none" stroke="var(--bd)" strokeWidth="8"/>
        <circle cx="56" cy="56" r={r} fill="none" stroke={done?'var(--s)':'var(--p)'} strokeWidth="8" strokeDasharray={c} strokeDashoffset={c-(pct/100)*c} style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dashoffset 0.9s linear'}}/>
        <text x="56" y="52" textAnchor="middle" fontSize="26" fontWeight="700" fill="var(--tx)">{left}</text>
        <text x="56" y="70" textAnchor="middle" fontSize="11" fill="var(--tx3)">초</text>
      </svg>
      {done?(<div style={{color:'var(--s)',fontWeight:700,fontSize:15,padding:'8px 20px',background:'var(--s2)',borderRadius:8}}>✅ 유지 완료!</div>):(
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-p" style={{width:100,padding:'10px 0',fontSize:14}} onClick={()=>setRunning(r=>!r)}>{running?<Pause size={15}/>:<Play size={15}/>}{running?'일시정지':'시작'}</button>
          <button className="btn btn-g" style={{width:44,padding:'10px 0'}} onClick={reset}><RotateCcw size={15}/></button>
        </div>
      )}
    </div>
  );
}

/* ─── 운동 상세 ─── */
function ExerciseDetail({ex,exercises,completed,onBack,onComplete}){
  const [tab,setTab]=useState('guide');
  const [set,setSet]=useState(0);
  const [rep,setRep]=useState(0);
  const [showPraise,setShowPraise]=useState(false);
  const [praiseMsg,setPraiseMsg]=useState('');
  const totalSets=ex.sets||1,totalReps=ex.reps||1,allSetsD=set>=totalSets;
  const hasPostureImage=!!ILLUS_IMAGES[ex.id];
  const isCompleted=!!completed[ex.id];
  const currentIdx=exercises.findIndex(e=>e.id===ex.id);

  const addRep=()=>{
    if(allSetsD)return;
    if(rep+1>=totalReps){setRep(0);setSet(s=>s+1);}else setRep(r=>r+1);
  };

  const handleMark=()=>{
    const msg=PRAISE[Math.floor(Math.random()*PRAISE.length)];
    setPraiseMsg(msg);
    setShowPraise(true);
    onComplete();
  };

  return(
    <div className="screen slide" style={{paddingBottom:80}}>
      {/* 헤더 */}
      <div style={{background:'var(--p)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={onBack} style={{background:'rgba(255,255,255,.2)',border:'none',borderRadius:8,padding:8,cursor:'pointer',color:'#fff',display:'flex'}}><ChevronLeft size={20}/></button>
        <div style={{flex:1}}>
          <div style={{color:'rgba(255,255,255,.8)',fontSize:12}}>{ex.nameEn}</div>
          <div style={{color:'#fff',fontSize:17,fontWeight:700}}>{ex.name}</div>
        </div>
        <div style={{background:'rgba(255,255,255,.2)',borderRadius:8,padding:'4px 10px'}}>
          <span style={{fontSize:12,color:'#fff',fontWeight:600}}>{currentIdx+1}/{exercises.length}</span>
        </div>
        {isCompleted&&<CheckCircle size={22} color="#fff"/>}
      </div>

      <div style={{padding:16}}>
        {/* 탭 */}
        <div style={{display:'flex',background:'var(--sur2)',borderRadius:10,padding:3,marginBottom:16}}>
          {[['guide','📋 운동 안내'],['exec','▶ 운동 실행']].map(([k,label])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,border:'none',borderRadius:8,padding:'10px 0',fontSize:13,fontWeight:600,cursor:'pointer',background:tab===k?'var(--sur)':'transparent',color:tab===k?'var(--p)':'var(--tx3)',transition:'all .2s',boxShadow:tab===k?'0 1px 3px rgba(0,0,0,.1)':'none'}}>{label}</button>
          ))}
        </div>

        {/* 운동 안내 탭 */}
        {tab==='guide'&&(
          <div className="fade">
            <div className="card" style={{marginBottom:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
                {[['📍 자세',ex.pos],['🔁 세트',ex.sets?`${ex.sets}세트`:'—'],['📊 횟수',ex.reps?`${ex.reps}회`:(ex.unit||'—')],['⏱ 유지',ex.hold?`${ex.hold}초`:'—']].map(([l,v])=>(
                  <div key={l} style={{background:'var(--sur2)',borderRadius:8,padding:'8px 10px'}}>
                    <div style={{fontSize:11,color:'var(--tx3)',marginBottom:2}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:600,color:'var(--tx)'}}>{v}</div>
                  </div>
                ))}
              </div>
              <p style={{fontSize:14,color:'var(--tx2)',lineHeight:1.65}}>{ex.desc}</p>
            </div>

            {/* ── 자세 이미지 영역 (SVG 삽화 대체) ── */}
            {hasPostureImage && <PostureImages exId={ex.id}/>}

            {ex.ok&&(<div className="card" style={{marginBottom:12,border:'1.5px solid var(--s)'}}><div style={{fontSize:13,fontWeight:700,color:'var(--s)',marginBottom:8}}>✅ 올바른 동작</div>{ex.ok.map((o,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:i<ex.ok.length-1?6:0}}><Check size={14} color="var(--s)" style={{marginTop:2,flexShrink:0}}/><span style={{fontSize:13,color:'var(--tx2)'}}>{o}</span></div>)}</div>)}
            {ex.ng&&(<div className="card" style={{border:'1.5px solid var(--d)'}}><div style={{fontSize:13,fontWeight:700,color:'var(--d)',marginBottom:8}}>⚠️ 이렇게 하지 마세요</div>{ex.ng.map((n,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:i<ex.ng.length-1?6:0}}><X size={14} color="var(--d)" style={{marginTop:2,flexShrink:0}}/><span style={{fontSize:13,color:'var(--tx2)'}}>{n}</span></div>)}</div>)}
          </div>
        )}

        {/* 운동 실행 탭 */}
        {tab==='exec'&&(
          <div className="fade">
            <div className="card" style={{marginBottom:12,textAlign:'center'}}>
              <div style={{fontSize:13,color:'var(--tx2)',marginBottom:10,fontWeight:600}}>세트 진행</div>
              <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:8}}>
                {Array.from({length:totalSets}).map((_,i)=>(
                  <div key={i} style={{width:36,height:36,borderRadius:'50%',background:i<set?'var(--s)':set===i?'var(--p)':'var(--bd)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,fontWeight:700,color:i<=set?'#fff':'var(--tx3)',transition:'all .3s'}}>
                    {i<set?'✓':i+1}
                  </div>
                ))}
              </div>
              <div style={{fontSize:13,color:'var(--tx2)'}}>{allSetsD?<span style={{color:'var(--s)',fontWeight:700}}>🎉 모든 세트 완료!</span>:<span>현재 <strong style={{color:'var(--p)'}}>{set+1}세트</strong> 진행 중</span>}</div>
            </div>

            {ex.hold&&!allSetsD&&(
              <div className="card" style={{marginBottom:12,textAlign:'center'}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--tx)',marginBottom:14}}>{ex.hold}초 유지 타이머</div>
                <ExerciseTimer key={`${set}-${rep}`} holdTime={ex.hold} onAutoRep={addRep}/>
              </div>
            )}

            {!ex.isPassive&&(
              <div className="card" style={{marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:700,color:'var(--tx)',marginBottom:12,textAlign:'center'}}>횟수 카운터</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:20,marginBottom:14}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:52,fontWeight:900,color:'var(--p)',lineHeight:1}}>{rep}</div>
                    <div style={{fontSize:13,color:'var(--tx3)'}}>/ {totalReps} 회</div>
                  </div>
                  <div style={{width:1,height:60,background:'var(--bd)'}}/>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:52,fontWeight:900,color:allSetsD?'var(--s)':'var(--tx2)',lineHeight:1}}>{set}</div>
                    <div style={{fontSize:13,color:'var(--tx3)'}}>/ {totalSets} 세트</div>
                  </div>
                </div>
                <div style={{background:'var(--bd)',borderRadius:4,height:6,marginBottom:12,overflow:'hidden'}}>
                  <div style={{background:'var(--p)',height:6,borderRadius:4,width:`${(rep/totalReps)*100}%`,transition:'width .3s'}}/>
                </div>
                {!allSetsD?(
                  <button className="btn btn-p" onClick={addRep}><Zap size={18}/> 횟수 카운트 +1 ({rep+1}/{totalReps})</button>
                ):(
                  <div style={{padding:12,background:'var(--s2)',borderRadius:8,textAlign:'center',color:'var(--s)',fontWeight:700}}>✅ 모든 세트 완료!</div>
                )}
              </div>
            )}

            {!isCompleted?(
              <button className="btn btn-s" onClick={handleMark} style={{fontSize:15}}>
                <CheckCircle size={18}/> 운동 완료 체크
              </button>
            ):(
              <div style={{background:'var(--s2)',border:'1.5px solid var(--s)',borderRadius:12,padding:14,textAlign:'center'}}>
                <div style={{fontSize:20,marginBottom:4}}>✅</div>
                <div style={{fontSize:14,fontWeight:700,color:'var(--s)'}}>완료된 운동입니다</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

  const W=320,H=110,barW=30,gap=(W-barW*7)/6;
  const data=weekDays.map((d,i)=>{
    const str=toDateStr(d);
    const isFuture=d>today&&str!==todayStr;
    const isToday=str===todayStr;
    const hist=completionHistory[str];
    const done=hist?.done||0;
    const total=isToday?(hist?.total||todayExTotal):hist?.total||0;
    const pct=total>0?done/total:0;
    return{str,done,total,pct,isFuture,isToday,dayName:dayNames[i]};
  });
  const maxTotal=Math.max(...data.map(d=>d.total),1);
  return(
    <div>
      <svg width="100%" viewBox={`0 0 ${W+40} ${H+50}`} style={{display:'block'}}>
        {[0.25,0.5,0.75,1].map(v=><line key={v} x1="28" y1={H-v*H} x2={W+28} y2={H-v*H} stroke="var(--bd)" strokeWidth="0.8" strokeDasharray="4"/>)}
        {data.map(({done,total,pct,isFuture,isToday,dayName},i)=>{
          const x=28+i*(barW+gap);
          const bh=Math.max(pct*H,total>0?4:0);
          const fill=isFuture||!total?'transparent':pct>=1?'var(--s)':isToday?'var(--p)':'#94A3B8';
          return(
            <g key={dayName}>
              <rect x={x} y={0} width={barW} height={H} rx={6} fill={isFuture?'#F1F5F9':'var(--sur2)'}/>
              {!isFuture&&total>0&&<rect x={x} y={H-bh} width={barW} height={bh} rx={Math.min(bh,6)} fill={fill}/>}
              {!isFuture&&total>0&&done>0&&<text x={x+barW/2} y={H-bh-6} textAnchor="middle" fontSize="9" fontWeight="700" fill={fill}>{done}</text>}
              <text x={x+barW/2} y={H+18} textAnchor="middle" fontSize="13" fontWeight={isToday?'700':'400'} fill={isToday?'var(--p)':'var(--tx3)'}>{dayName}</text>
              {isToday&&<circle cx={x+barW/2} cy={H+30} r="3" fill="var(--p)"/>}
              {!isFuture&&total>0&&<text x={x+barW/2} y={H+44} textAnchor="middle" fontSize="9" fill="var(--tx3)">{total}</text>}
            </g>
          );
        })}
        {[0,Math.round(maxTotal/2),maxTotal].map((v,i)=><text key={i} x="22" y={H-(v/maxTotal)*H+4} textAnchor="end" fontSize="9" fill="var(--tx3)">{v}</text>)}
      </svg>
      <div style={{display:'flex',gap:12,padding:'2px 8px 6px',flexWrap:'wrap'}}>
        {[{c:'var(--s)',l:'달성'},{c:'var(--p)',l:'오늘'},{c:'#94A3B8',l:'진행 중'}].map(({c,l})=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--tx2)'}}>
            <div style={{width:10,height:10,borderRadius:2,background:c}}/>{l}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── 하단 네비게이션 ─── */
function BottomNav({tab,setTab}){
  const items=[{k:'home',label:'홈',icon:<Home size={22}/>},{k:'exercises',label:'운동',icon:<Dumbbell size={22}/>},{k:'progress',label:'기록',icon:<BarChart2 size={22}/>},{k:'settings',label:'설정',icon:<Settings size={22}/>}];
  return(
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:'var(--sur)',borderTop:'1px solid var(--bd)',display:'flex',zIndex:100}}>
      {items.map(({k,label,icon})=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'10px 0 8px',border:'none',background:'transparent',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===k?'var(--p)':'var(--tx3)',fontFamily:'inherit',fontSize:11,fontWeight:tab===k?700:400,transition:'color .2s'}}>
          {icon}{label}

/* ─── 메인 앱 ─── */
function App(){
  const [surgeryDate,setSurgeryDate]=useState('');
  const [dark,setDark]=useState(false);
  const [fontSize,setFontSize]=useState(1);
  const [tab,setTab]=useState('home');
  const [selectedEx,setSelectedEx]=useState(null);
  const [completed,setCompleted]=useState({});
  const [notif,setNotif]=useState(true);
  const [showNRS,setShowNRS]=useState(false);
  const [dailyNRS,setDailyNRS]=useState(null);
  const [completionHistory,setCompletionHistory]=useState({});
  const [praiseToast,setPraiseToast]=useState('');

  const days=surgeryDate?Math.max(0,Math.floor((Date.now()-new Date(surgeryDate).getTime())/86400000)):0;
  const exercises=getExsByDay(days);

  const handleComplete=(id)=>{
    const newCompleted={...completed,[id]:true};
    setCompleted(newCompleted);
    const done=exercises.filter(e=>newCompleted[e.id]).length;
    setCompletionHistory(h=>({...h,[getTodayStr()]:{done,total:exercises.length}}));
    const msg=PRAISE[Math.floor(Math.random()*PRAISE.length)];
    setPraiseToast(msg);
    setTimeout(()=>setPraiseToast(''),3500);
    if(done>=exercises.length){
      setSelectedEx(null);
      setTimeout(()=>setShowNRS(true),100);
    } else {
      setSelectedEx(null);
    }
  };

  if(!surgeryDate) return(
    <div className="app" data-dark={String(dark)}><Styles/><OnboardingScreen onConfirm={d=>setSurgeryDate(d)}/></div>
  );

  return(
    <div className="app" data-dark={String(dark)} style={{fontSize:[14,16,18][fontSize]}}>
      <Styles/>
      {showNRS&&(
        <div style={{position:'fixed',inset:0,zIndex:200,background:'var(--bg)',maxWidth:430,margin:'0 auto'}}>
          <NRSDailyCheck onConfirm={score=>{setDailyNRS(score);setShowNRS(false);setTab('home');}}/>
        </div>
      )}
      {selectedEx&&!showNRS?(
        <ExerciseDetail
          ex={selectedEx}
          exercises={exercises}
          completed={completed}
          onBack={()=>setSelectedEx(null)}
          onComplete={()=>handleComplete(selectedEx.id)}
        />
      ):(
        <>
          {tab==='home'&&<HomeScreen days={days} exercises={exercises} completed={completed} onSelectEx={setSelectedEx} dailyNRS={dailyNRS} praiseToast={praiseToast}/>}
          {tab==='exercises'&&<AllExercisesScreen onSelect={setSelectedEx}/>}
          {tab==='progress'&&<ProgressScreen completionHistory={completionHistory} days={days} exercises={exercises} dailyNRS={dailyNRS}/>}
          {tab==='settings'&&<SettingsScreen dark={dark} setDark={setDark} fontSize={fontSize} setFontSize={setFontSize} notif={notif} setNotif={setNotif} surgeryDate={surgeryDate} setSurgeryDate={setSurgeryDate}/>}
          {!showNRS&&<BottomNav tab={tab} setTab={setTab}/>}
        </>
      )}
    </div>
  );
}

/* ─── 마운트 ─── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

  </script>
