<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROM-Connect: 관절 각도 측정 웹</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; color: #333; }
        .container { text-align: center; }
        #imagePreview { max-width: 100%; height: auto; border: 2px dashed #ccc; border-radius: 8px; margin-top: 15px; display: none; }
        .result-box { margin-top: 20px; padding: 20px; background-color: #f0f8ff; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .recommendation { margin-top: 20px; padding: 20px; background-color: #e6ffe6; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ROM-Connect 측정기</h2>
        <p>수술 부위(예: 무릎)가 측면에서 잘 보이는 사진을 업로드해 주세요.</p>
        
        <input type="file" id="imageUpload" accept="image/*" class="btn">
        <br>
        <img id="imagePreview" alt="업로드된 이미지 미리보기">
        
        <div id="resultBox" class="result-box">
            <h3>📐 측정 결과</h3>
            <p id="angleResult" style="font-size: 1.2em; font-weight: bold;">AI 이미지 분석 중...</p>
        </div>

        <div id="recommendationBox" class="recommendation">
            <h3>💪 맞춤형 재활 운동 추천</h3>
            <p id="exerciseText"></p>
            <button class="btn" style="background-color: #28a745;">추천 운동 영상 보기</button>
        </div>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const imagePreview = document.getElementById('imagePreview');
        const resultBox = document.getElementById('resultBox');
        const angleResult = document.getElementById('angleResult');
        const recommendationBox = document.getElementById('recommendationBox');
        const exerciseText = document.getElementById('exerciseText');

        // 1. 함수들을 밖으로 뺍니다 (중첩 방지)
        function calculateAngle(a, b, c) {
            const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
            let angle = Math.abs(radians * 180.0 / Math.PI);
            if (angle > 180.0) {
                angle = 360.0 - angle;
            }
            return angle;
        }

        function showRecommendation(angle) {
            recommendationBox.style.display = 'block';
            if (angle < 90) {
                exerciseText.innerHTML = "<strong>[초급 단계]</strong> 현재 각도가 90도 미만입니다. '수건을 이용한 발뒤꿈치 슬라이딩' 운동을 추천합니다.";
            } else if (angle >= 90 && angle <= 120) {
                exerciseText.innerHTML = "<strong>[중급 단계]</strong> 회복 궤적이 양호합니다. '의자에 앉아 다리 뻗고 버티기' 운동을 권장합니다.";
            } else {
                exerciseText.innerHTML = "<strong>[고급 단계]</strong> 가동 범위가 양호합니다. '미니 스쿼트'로 전환할 수 있습니다.";
            }
        }

        function runPoseEstimationSimulation() {
            // 가상의 랜드마크 데이터로 시뮬레이션
            const hip = { x: 0.5, y: 0.3 };
            const knee = { x: 0.6, y: 0.6 };
            const ankle = { x: 0.45, y: 0.85 };

            const kneeAngle = calculateAngle(hip, knee, ankle).toFixed(1);
            angleResult.innerHTML = `현재 무릎 굴곡 각도는 <span style='color: #d9534f;'>${kneeAngle}도</span>로 측정되었습니다.`;
            showRecommendation(kneeAngle);
        }

        // 2. 이벤트 리스너를 독립적으로 설정합니다.
        imageUpload.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.style.display = 'block';
                    resultBox.style.display = 'block';
                    recommendationBox.style.display = 'none';
                    angleResult.innerText = "AI 모델이 관절 포인트를 분석 중입니다...";
                    
                    // 1.5초 후 시뮬레이션 실행
                    setTimeout(() => runPoseEstimationSimulation(), 1500);
                }
                reader.readAsDataURL(file);
            }
        });

        // 3. MediaPipe 설정 (실제 분석 기능을 넣을 때 사용)
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({
            modelComplexity: 1,
            smoothLandmarks: true,
            enableSegmentation: false,
        });

        pose.onResults((results) => {
            // 실제 이미지 분석 결과가 나왔을 때 실행할 코드 (현재는 시뮬레이션 위주)
        });
    </script>
</body>
</html>
